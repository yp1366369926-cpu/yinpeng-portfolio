name: Deploy Portfolio

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply requested portfolio fixes
        run: |
          node <<'NODE'
          const fs = require('fs');

          const mainPath = 'src/main.jsx';
          let main = fs.readFileSync(mainPath, 'utf8');

          const film01Before = `    no: "01",
    title: "Material Pulse",
    zh: "材质脉冲",
    category: "PRODUCT MATERIAL · MACRO MOTION",
    description: "以微距镜头放大鞋履材质、结构与光泽，让产品细节成为动态叙事的主角。",
    video: asset("motion/material-pulse.mp4"),
    poster: asset("motion/material-pulse.jpg"),`;
          const film01After = `    no: "01",
    title: "Material Pulse",
    zh: "材质脉冲",
    category: "PRODUCT MATERIAL · MACRO MOTION",
    description: "以微距镜头放大鞋履材质、结构与光泽，让产品细节成为动态叙事的主角。",
    video: asset("motion/light-matrix.mp4"),
    poster: asset("motion/light-matrix.jpg"),`;

          const film03Before = `    no: "03",
    title: "Light Matrix",
    zh: "光栅矩阵",
    category: "PARTICLE SYSTEM · BRAND MOTION",
    description: "让粒子、光栅与几何文字在秩序和失序之间呼吸，形成品牌能量的动态标记。",
    video: asset("motion/light-matrix.mp4"),
    poster: asset("motion/light-matrix.jpg"),`;
          const film03After = `    no: "03",
    title: "Light Matrix",
    zh: "光栅矩阵",
    category: "PARTICLE SYSTEM · BRAND MOTION",
    description: "让粒子、光栅与几何文字在秩序和失序之间呼吸，形成品牌能量的动态标记。",
    video: asset("motion/material-pulse.mp4"),
    poster: asset("motion/material-pulse.jpg"),`;

          main = main.replace(film01Before, film01After).replace(film03Before, film03After);
          fs.writeFileSync(mainPath, main);

          const stylesPath = 'src/styles.css';
          let styles = fs.readFileSync(stylesPath, 'utf8');
          styles = styles.replace(
            '.hmi-case-page { --case-accent: #ff7954; }',
            `.hmi-case-page {
  --case-accent: #ff7954;
  overflow: visible;
}
.hmi-case-page [data-reveal] {
  opacity: 1;
  translate: 0 0;
  filter: blur(0);
}`
          );
          fs.writeFileSync(stylesPath, styles);
          NODE

      - name: Build site
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
