name: Deploy Portfolio

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply requested portfolio fixes
        run: |
          node <<'NODE'
          const fs = require('fs');
          const mainPath = 'src/main.jsx';
          let main = fs.readFileSync(mainPath, 'utf8');
          const start = main.indexOf('const motionFilms = [');
          const end = main.indexOf('];', start);
          if (start !== -1 && end !== -1) {
            let block = main.slice(start, end);
            const replaceFilmMedia = (source, no, video, poster) => {
              const filmStart = source.indexOf(`no: "${no}"`);
              if (filmStart === -1) return source;
              const nextFilm = source.indexOf(`no: "${String(Number(no) + 1).padStart(2, '0')}"`, filmStart + 1);
              const filmEnd = nextFilm === -1 ? source.length : nextFilm;
              const before = source.slice(0, filmStart);
              const film = source.slice(filmStart, filmEnd).replace(/video: asset\("motion\/[^\"]+\.mp4"\),\n\s*poster: asset\("motion\/[^\"]+\.jpg"\),/, `video: asset("${video}"),\n    poster: asset("${poster}"),`);
              const after = source.slice(filmEnd);
              return before + film + after;
            };
            block = replaceFilmMedia(block, '01', 'motion/light-matrix.mp4', 'motion/light-matrix.jpg');
            block = replaceFilmMedia(block, '03', 'motion/material-pulse.mp4', 'motion/material-pulse.jpg');
            main = main.slice(0, start) + block + main.slice(end);
          }
          fs.writeFileSync(mainPath, main);

          const stylesPath = 'src/styles.css';
          let styles = fs.readFileSync(stylesPath, 'utf8');
          styles = styles.replace('.hmi-case-page { --case-accent: #ff7954; }', '.hmi-case-page {\n  --case-accent: #ff7954;\n  overflow: visible;\n}\n.hmi-case-page [data-reveal] {\n  opacity: 1;\n  translate: 0 0;\n  filter: blur(0);\n}');
          fs.writeFileSync(stylesPath, styles);
          NODE

      - name: Build site
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
