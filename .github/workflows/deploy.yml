name: Deploy Portfolio

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply requested portfolio fixes
        run: |
          node <<'NODE'
          const fs = require('fs');
          const mainPath = 'src/main.jsx';
          let main = fs.readFileSync(mainPath, 'utf8');
          const marker02 = '    no: "02",';
          const split02 = main.split(marker02);
          if (split02.length === 2) {
            split02[0] = split02[0].replace('video: asset("motion/material-pulse.mp4"),\n    poster: asset("motion/material-pulse.jpg")', 'video: asset("motion/light-matrix.mp4"),\n    poster: asset("motion/light-matrix.jpg")');
            main = split02.join(marker02);
          }
          const marker03 = '    no: "03",';
          const split03 = main.split(marker03);
          if (split03.length === 2) {
            split03[1] = split03[1].replace('video: asset("motion/light-matrix.mp4"),\n    poster: asset("motion/light-matrix.jpg")', 'video: asset("motion/material-pulse.mp4"),\n    poster: asset("motion/material-pulse.jpg")');
            main = split03.join(marker03);
          }
          fs.writeFileSync(mainPath, main);

          const stylesPath = 'src/styles.css';
          let styles = fs.readFileSync(stylesPath, 'utf8');
          styles = styles.replace('.hmi-case-page { --case-accent: #ff7954; }', '.hmi-case-page {\n  --case-accent: #ff7954;\n  overflow: visible;\n}\n.hmi-case-page [data-reveal] {\n  opacity: 1;\n  translate: 0 0;\n  filter: blur(0);\n}');
          fs.writeFileSync(stylesPath, styles);
          NODE

      - name: Build site
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
